version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline || npm install --cache .npm --prefer-offline --no-audit --no-fund
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline || npm install --cache .npm --prefer-offline --no-audit --no-fund
        - 'test -f amplify_outputs.json && ! grep -q __placeholder amplify_outputs.json && grep -q ''"data"'' amplify_outputs.json || { echo "FAIL amplify_outputs.json is missing a placeholder or lacks .data - backend never fully deployed - refusing to publish a broken frontend"; exit 1; }'
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
