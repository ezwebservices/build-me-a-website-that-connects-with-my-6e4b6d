version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline || npm install --cache .npm --prefer-offline --no-audit --no-fund
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline || npm install --cache .npm --prefer-offline --no-audit --no-fund
        - node -e "const fs=require('fs'); if(!fs.existsSync('amplify_outputs.json')){console.error('FAIL: amplify_outputs.json missing — backend phase did not generate real config. Refusing to build a placeholder bundle.');process.exit(1)} const o=JSON.parse(fs.readFileSync('amplify_outputs.json','utf8')); if(o.__placeholder||!o.data){console.error('FAIL: amplify_outputs.json is a placeholder or missing .data — backend never fully deployed. Refusing to publish a broken frontend.');process.exit(1)} console.log('amplify_outputs.json looks real — proceeding with frontend build.')"
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
