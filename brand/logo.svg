<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="emberGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C2452D"/>
      <stop offset="100%" stop-color="#B8935A"/>
    </linearGradient>
  </defs>
  <g transform="translate(20,20)">
    <!-- Toolpath mark: concentric square paths suggesting a CNC cut -->
    <rect x="4" y="4" width="72" height="72" fill="none" stroke="#0E0F12" stroke-width="2"/>
    <rect x="14" y="14" width="52" height="52" fill="none" stroke="#0E0F12" stroke-width="1.5"/>
    <rect x="24" y="24" width="32" height="32" fill="none" stroke="#0E0F12" stroke-width="1"/>
    <!-- Center endmill dot -->
    <circle cx="40" cy="40" r="5" fill="url(#emberGlow)"/>
    <!-- Entry path line -->
    <line x1="40" y1="0" x2="40" y2="24" stroke="#C2452D" stroke-width="1.5" stroke-dasharray="2 2"/>
  </g>
  <g transform="translate(120,0)" font-family="Georgia, 'Times New Roman', serif" fill="#0E0F12">
    <text x="0" y="55" font-size="38" font-weight="400" letter-spacing="1">IRONLACE</text>
    <text x="2" y="85" font-size="14" font-weight="300" letter-spacing="8" fill="#4A4D52">S T U D I O</text>
    <line x1="0" y1="95" x2="240" y2="95" stroke="#B8935A" stroke-width="0.75"/>
    <text x="0" y="110" font-size="9" letter-spacing="3" fill="#4A4D52">PRECISION CUT · ARTFULLY MADE</text>
  </g>
</svg>
